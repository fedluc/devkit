project:
  name: pybind11-hello-example

build:
  default: all
  cpp:
    backend: cmake
    source_dir: cpp
    build_dir: build-cpp
    generator: Ninja
    targets: ["hello_cli"]
  python:
    backend: python-build

install:
  targets:
    dev:
      backend: pip
      path: .
      editable: true
    system:
      backend: apt-get
      args: ["-y"]
      packages: ["build-essential", "cmake", "ninja-build"]
      hooks:
        pre:
          - ["apt-get", "update"]

clean:
  paths:
    - build-cpp
    - build-wheel
    - dist
